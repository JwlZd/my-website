<!DOCTYPE html>
<html>
<head>
  <title>Sweet Recipes</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>

    *{
      cursor: url("Spatula.png") 16 16, auto;
    }

    button,
    a,
    img {
      cursor: url("SpongeBob.png") 16 16, pointer;
      font-family: 'Pacifico', cursive;
    }

    h3 {
      font-family: 'Pacifico', cursive;
    }

  </style>

</head>

<body class="text-center bg-pink-200 min-h-screen">

  <!-- TITLE -->
  <h3 class="text-orange-800 text-5xl font-bold mt-10">
    Sweet Recipes!
  </h3>

  <!-- NAVIGATION -->
  <div class="flex justify-center gap-6 mt-10 flex-wrap">

    <a href="index.html">
      <button class="bg-yellow-100 hover:bg-yellow-500 text-yellow-700 text-2xl px-6 py-3 rounded-2xl shadow-lg transition duration-300">
        Home Page!
      </button>
    </a>

    <a href="Savory.html">
      <button class="bg-orange-200 hover:bg-orange-500 text-orange-700 text-2xl px-6 py-3 rounded-2xl shadow-lg transition duration-300">
        Savory Recipes!
      </button>
    </a>

    <a href="Drinks.html">
      <button class="bg-blue-200 hover:bg-blue-500 text-blue-700 text-2xl px-6 py-3 rounded-2xl shadow-lg transition duration-300">
        Drinks!
      </button>
    </a>

  </div>

  <div class="flex justify-center gap-8 flex-wrap mt-10 pb-10">

    <div>
      <img src="https://bakerbynature.com/wp-content/uploads/2017/06/everydaychocolatechipcookies12-1-of-1.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie1')">

    </div>

    <div>
      <img src="https://icecreamcafe.ca/wp-content/uploads/2026/02/Brownie-Recipe-with-Cocoa-Powder-1200x821-1.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie2')">

    </div>

    <div>
      <img src="https://drivemehungry.com/wp-content/uploads/2022/07/strawberry-cheesecake-11-500x500.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie3')">

    </div>

    <div>
      <img src="https://www.whitakerschocolates.com/cdn/shop/articles/20251208115733-healthy-20chocolate-20cupcakes-20recipe-20uk_ca9aab53-c81a-4f83-86b0-d14fbacc5187.png?v=1765196776"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie4')">

    </div>

    <div>
      <img src="https://horizon.com/wp-content/uploads/recipe-cin-roll-hero.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie5')">

    </div>

    <div>
      <img src="https://www.carluccios.com/cdn/shop/articles/Tiramisu_1d9de3f3-1f3d-40c4-bcab-b1c669a7616d.jpg?v=1752744640"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie6')">

    </div>

    <div>
      <img src="https://www.mybakingaddiction.com/wp-content/uploads/2024/05/sliced-peanut-butter-banana-bread-hero.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie7')">

    </div>

    <div>
      <img src="https://www.simplytrinicooking.com/wp-content/uploads/red-velvet-cake.jpg.webp"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie8')">

    </div>

    <div>
      <img src="https://www.glorioustreats.com/wp-content/uploads/2024/07/easy-blueberry-muffins-square.jpeg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie9')">

    </div>

    <div>
      <img src="https://www.recipetineats.com/tachyon/2025/11/Crepese-1.jpg"
        class="w-60 h-60 object-cover rounded-2xl shadow-lg hover:scale-105 transition duration-300"
        onclick="openModal('cookie10')">

    </div>

  </div>

  <div id="modal"
       class="hidden fixed inset-0 bg-black bg-opacity-60 flex justify-center items-center z-50">

    <div class="bg-white w-96 max-h-[80vh] overflow-y-auto p-6 rounded-2xl relative text-left">

      <button onclick="closeModal()"
        class="absolute top-2 right-3 text-xl font-bold">
    
      </button>

      <h2 id="modalTitle"
          class="text-2xl font-bold mb-4 text-pink-500">
      </h2>

      <p id="modalText"
         class="text-gray-700 whitespace-pre-wrap">
      </p>

    </div>

  </div>

  <script>

    const recipes = {

      cookie1: {
        title: "Chocolate Chip Cookies",
        text: `1/2 cup (115g) unsalted butter
1/2 cup (100g) sugar
3/4 cup (150g) brown sugar
1 egg
Splash of vanilla
1 1/4 cup flour
1/2 tsp baking soda
Dark chocolate chunks

1. Brown butter.
2. Mix sugars.
3. Add egg + vanilla.
4. Add dry ingredients.
5. Fold in chocolate.
6. Chill 30 min.
7. Bake at 175°C for 12–14 min.`
      },

      cookie2: {
        title: "Fudgy Brownies",
        text: `250g dark chocolate
200g butter
325g brown sugar
3 eggs
90g flour
1/2 tsp baking powder

1. Melt butter + sugar.
2. Add cocoa + vanilla.
3. Add eggs.
4. Add flour.
5. Bake at 175°C for 25 min.`
      },

      cookie3: {
        title: "Strawberry Cheesecake",
        text: `Base:
250g digestive biscuits
100g melted butter

Filling:
600g cream cheese
100g icing sugar
284ml cream
400g strawberries

1. Crush biscuits + butter.
2. Chill base.
3. Mix filling.
4. Pour onto base.
5. Chill overnight.
6. Add strawberries.`
      },

      cookie4: {
        title: "Chocolate Cupcakes",
        text: `2 cups flour
3/4 cup cocoa powder
1 1/2 cups sugar
2 eggs
1 cup buttermilk

1. Mix dry ingredients.
2. Add wet ingredients.
3. Fill cupcake liners.
4. Bake at 175°C for 18 - 22 min.`
      },

      cookie5: {
  title: "Cinnamon Rolls",
  text: `Dough:
3 cups flour
1 cup warm milk
2 1/4 tsp yeast
1 egg
1/4 cup butter

Filling:
Brown sugar
Cinnamon
Butter

1. Mix dough ingredients.
2. Let rise 1 hour.
3. Roll dough flat.
4. Add cinnamon filling.
5. Roll and slice.
6. Bake at 180°C for 20 - 25 min.`
},

     cookie6: {
  title: "Tiramisu",
  text: `250g mascarpone
1 cup heavy cream
1/3 cup sugar
Espresso coffee
Ladyfinger biscuits
Cocoa powder

1. Whip cream + sugar.
2. Fold in mascarpone.
3. Dip ladyfingers in coffee.
4. Layer cream + biscuits.
5. Chill overnight.
6. Dust cocoa powder on top.`
},

  cookie7: {
    title: "Banana Bread",
    text: `3 ripe bananas  
1/2 cup melted butter  
3/4 cup brown sugar  
1 egg  
1 tsp vanilla  
1 1/2 cups flour  
1 tsp baking soda  
Pinch of salt  

1. Mash bananas.  
2. Mix butter + sugar.  
3. Add egg + vanilla.  
4. Stir in dry ingredients.  
5. Pour into loaf pan.  
6. Bake at 175°C for 50 - 60 min.`
  },

  cookie8: {
    title: "Red Velvet Cake",
    text: `2 1/2 cups flour  
1 1/2 cups sugar  
1 tsp baking soda  
1 tbsp cocoa powder  
2 eggs  
1 cup buttermilk  
1/2 cup oil  
Red food coloring  
1 tsp vanilla  

1. Mix dry ingredients.  
2. Add wet ingredients.  
3. Mix until smooth.  
4. Pour into cake pan.  
5. Bake at 175°C for 30 - 35 min.  
6. Frost with cream cheese frosting.`
  },

  cookie9: {
    title: "Blueberry Muffins",
    text: `2 cups flour  
1/2 cup sugar  
2 tsp baking powder  
1/2 tsp salt  
1/2 cup butter  
1 egg  
1 cup milk  
1 cup blueberries  

1. Mix dry ingredients.  
2. Add wet ingredients.  
3. Fold in blueberries.  
4. Spoon into muffin tray.  
5. Bake at 180°C for 20 - 25 min.`
  },

  cookie10: {
    title: "Crepes",
    text: `1 cup flour  
2 eggs  
1 1/2 cups milk  
2 tbsp melted butter  
1 tbsp sugar  
Pinch of salt  

1. Whisk everything until smooth.  
2. Heat non-stick pan.  
3. Pour thin layer of batter.  
4. Cook 1 - 2 min per side.  
5. Fill with Nutella, fruit, or cream.`
  }

};
    function openModal(recipeKey) {

      document.getElementById("modalTitle").innerText =
        recipes[recipeKey].title;

      document.getElementById("modalText").innerText =
        recipes[recipeKey].text;

      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    // CLOSE MODAL WHEN CLICKING OUTSIDE
    window.onclick = function(event) {

      const modal = document.getElementById("modal");

      if (event.target === modal) {
        closeModal();
      }

    }

  </script>

</body>
</html>
